<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - Restaurante Seoul</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <script src="./auth.js"></script>
</head>

<body>
    <div class="app-container">
        <header class="top-nav">
            <div class="logo">
                <h1>RESTAURANTE<span>SEOUL</span></h1>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Dashboard</a></li>
                    <li><a href="platillos.html" class="active">Menú</a></li>
                    <li><a href="pedidos.html">Pedidos</a></li>
                    <li><a href="inventario.html">Inventario</a></li>
                    <li><a href="reportes.html">Reportes</a></li>
                    <li><a href="#" onclick="logout()">Cerrar sesión</a></li>
                </ul>
            </nav>
        </header>

        <main class="main-content">
            <section id="platillos" class="view-section active">
                <header>
                    <h2>Gestión de Menú</h2>
                    <p>Configura los platos, sus precios y recetas.</p>
                </header>
                <vo-platillos></vo-platillos>
            </section>
        </main>
    </div>

    <template id="tpl-platillos">
        <div class="panel">
            <h3>Agregar / Editar Platillo</h3>
            <form id="form-platillo">
                <div class="form-group">
                    <label>Código del Platillo</label>
                    <input type="text" id="plat-codigo" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="plat-nombre" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <input type="text" id="plat-descripcion" class="form-control" required>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>URL de Imagen</label>
                        <input type="url" id="plat-imagen" class="form-control" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Valor de Venta (Q)</label>
                        <input type="number" id="plat-precio" class="form-control" required min="0" step="0.01">
                    </div>
                </div>

                <div class="panel" style="background: rgba(0,0,0,0.02); border: none; padding: 1.5rem;">
                    <h4>Receta (Ingredientes)</h4>
                    <div style="display: flex; gap: 1rem; align-items: flex-end; margin-bottom: 1rem;">
                        <div class="form-group" style="flex: 2; margin-bottom: 0;">
                            <label>Seleccionar Insumo</label>
                            <select id="plat-insumo" class="form-control"></select>
                        </div>
                        <div class="form-group" style="flex: 1; margin-bottom: 0;">
                            <label>Cantidad Necesaria</label>
                            <input type="number" id="plat-insumo-cant" class="form-control" min="0.01" step="0.01">
                        </div>
                        <button type="button" id="btn-add-ingrediente" class="btn-primary"
                            style="background: transparent; border: 1px solid black; color: black;">Añadir</button>
                    </div>
                    <ul id="lista-ingredientes-temp" style="margin-left: 1.5rem; margin-bottom: 1rem;"></ul>
                </div>

                <button type="submit" class="btn-primary">Guardar Platillo</button>
            </form>
        </div>

        <div class="panel" style="border: none; padding: 0;">
            <h3 style="margin-top: 2rem; border-bottom: none;">Menú de Platillos</h3>
            <div id="grid-platillos"
                style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; margin-top: 1rem;">
            </div>
        </div>
    </template>

    <script src="./storage.js"></script>
    <script src="./platillos.js"></script>
    <script src="./app.js"></script>
</body>

</html>
