<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Restaurante Seoul</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <style>
        .auth-container {
            max-width: 400px;
            margin: 5rem auto;
            text-align: center;
        }

        .auth-container .panel {
            padding: 3rem 2rem;
        }

        .auth-links {
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        .auth-links a {
            color: var(--color-primary);
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header class="top-nav">
            <div class="logo">
                <h1>RESTAURANTE<span>SEOUL</span></h1>
            </div>
        </header>
        <main class="main-content">
            <div class="auth-container">
                <div class="panel">
                    <h3>Iniciar Sesión</h3>
                    <form onsubmit="login(event)">
                        <div class="form-group">
                            <label for="username">Usuario</label>
                            <input type="text" id="username" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Contraseña</label>
                            <input type="password" id="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn-primary" style="width: 100%;">Ingresar</button>
                    </form>
                    <div class="auth-links">
                        ¿No tienes una cuenta? <a href="registro.html">Regístrate aquí</a>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
